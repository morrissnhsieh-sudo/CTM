# CTM PostgreSQL 16 — Production configuration
# Tuned for 8 vCPU / 32 GB RAM server

# Connections
listen_addresses = '*'
max_connections = 500

# Memory (25% RAM for shared_buffers)
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 64MB
maintenance_work_mem = 512MB
wal_buffers = 64MB

# Replication
wal_level = replica
max_wal_senders = 5
wal_keep_size = 1GB

# Checkpointing
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# Autovacuum (aggressive for OLTP)
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Logging
log_min_duration_statement = 500
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%t [%p]: [%l-1] db=%d,user=%u,app=%a,client=%h '

# Security
ssl = off   # TLS handled by Nginx

# Extensions
shared_preload_libraries = 'pg_stat_statements,vector'
pg_stat_statements.track = all
