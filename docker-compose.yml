
# CTM Platform ??Full local development stack
# Run: docker compose up -d
# All 10 modules + dependencies in < 2 minutes.

networks:
  ctm-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:

services:

  # ?ВЂ?ВЂ?ВЂ M9: PostgreSQL 16 + pgvector ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ctm-postgres
    environment:
      POSTGRES_USER: ctm
      POSTGRES_PASSWORD: ctm_dev_pass
      POSTGRES_DB: ctm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctm -d ctm"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M9: Redis 7.2 ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  redis:
    image: redis:7.2-alpine
    container_name: ctm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M8: Kafka 3.7 (KRaft mode ??no ZooKeeper) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  kafka:
    image: apache/kafka:3.7.0
    container_name: ctm-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ Kafka UI ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ctm-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: ctm-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M9: MinIO (S3-compatible) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  minio:
    image: minio/minio:latest
    container_name: ctm-minio
    environment:
      MINIO_ROOT_USER: ctm_admin
      MINIO_ROOT_PASSWORD: ctm_minio_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [ctm-net]

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: ctm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ctm_admin ctm_minio_pass;
        mc mb --ignore-existing local/ctm-attachments;
        mc mb --ignore-existing local/ctm-exports;
        mc mb --ignore-existing local/ctm-avatars;
        mc mb --ignore-existing local/ctm-backups;
        echo 'Buckets created';
      "
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M2: Collaboration Engine ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  collab-service:
    build:
      context: .
      dockerfile: apps/collab-service/Dockerfile
    container_name: ctm-collab
    environment:
      NODE_ENV: development
      PORT: "1234"
      DB_URL: postgresql://ctm:ctm_dev_pass@postgres:5432/ctm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev_jwt_secret_32bytes_here!!!!!
      JWT_ISSUER: http://localhost/
    ports:
      - "1234:1234"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M3+M4: API Gateway + Formula Engine ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  api-service:
    build:
      context: .
      dockerfile: apps/api-service/Dockerfile
    container_name: ctm-api
    environment:
      NODE_ENV: development
      PORT: "3001"
      DB_PRIMARY_URL: postgresql://ctm:ctm_dev_pass@postgres:5432/ctm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev_jwt_secret_32bytes_here!!!!!
      JWT_ISSUER: http://localhost/
      PM_GRPC_HOST: pm-service:50051
      AI_SERVICE_URL: http://ai-service:8001
      MESSAGING_SERVICE_URL: http://messaging-service:3002
      INTERNAL_TOKEN_SECRET: dev_internal_secret_32bytes_here!!
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ctm_admin
      AWS_SECRET_ACCESS_KEY: ctm_minio_pass
    ports:
      - "3001:3001"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M5: PM Service (Go) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  pm-service:
    build:
      context: .
      dockerfile: apps/pm-service/Dockerfile
    container_name: ctm-pm
    environment:
      DB_URL: postgresql://ctm:ctm_dev_pass@postgres:5432/ctm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      GRPC_ADDR: ":50051"
      HTTP_ADDR: ":8080"
    ports:
      - "50051:50051"
      - "8085:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M6: AI Agent Service (Python) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: ctm-ai
    environment:
      PORT: "8001"
      DB_URL: postgresql+asyncpg://ctm:ctm_dev_pass@postgres:5432/ctm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      # ?ВЂ?ВЂ Vertex AI (primary) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
      LLM_PROVIDER: vertex
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/vertex_key.json
      VERTEX_PROJECT_ID: d-sxd110x-ssd1-aaos
      VERTEX_REGION: us-central1
      VERTEX_MODEL_PRIMARY: gemini-2.5-flash
      VERTEX_MODEL_AGENT: claude-3-opus@20240229
      # ?ВЂ?ВЂ Fallback keys (optional) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # ?ВЂ?ВЂ Service endpoints ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
      CTM_API_URL: http://api-service:3001
      FORMULA_CALLBACK_URL: http://api-service:3001/v1/ai/formula/callback
    volumes:
      # Mount the Vertex AI service account key (read-only)
      - ${VERTEX_KEY_PATH:-C:/Users/User/Code/VertexKeys/d-sxd110x-ssd1-aaos-34f80b5f4448.json}:/run/secrets/vertex_key.json:ro
    ports:
      - "8001:8001"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M7: Messaging Service ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  messaging-service:
    build:
      context: .
      dockerfile: apps/messaging-service/Dockerfile
    container_name: ctm-messaging
    environment:
      NODE_ENV: development
      PORT: "3002"
      DB_URL: postgresql://ctm:ctm_dev_pass@postgres:5432/ctm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev_jwt_secret_32bytes_here!!!!!
      JWT_ISSUER: http://localhost/
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "3002:3002"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [ctm-net]

  # ?ВЂ?ВЂ?ВЂ M1: Frontend (Next.js 15) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    container_name: ctm-frontend
    command: sh -c "pnpm install && pnpm --filter @ctm/frontend dev"
    environment:
      CI: "true"
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_COLLAB_URL: ws://localhost:1234
      NEXT_PUBLIC_CHAT_URL: ws://localhost:3002
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev_nextauth_secret_32bytes_here
      # NextAuth v5 uses AUTH_* env vars (NEXTAUTH_* are v4 legacy names)
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: dev_nextauth_secret_32bytes_here
      AUTH_TRUST_HOST: "true"
      AUTH_API_BASE: http://api-service:3001
    ports:
      - "3000:3000"
    depends_on:
      - api-service
      - collab-service
      - messaging-service
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/.next
      - /app/apps/frontend/node_modules
      - /app/apps/api-service/node_modules
      - /app/apps/collab-service/node_modules
      - /app/apps/messaging-service/node_modules
      - /app/packages/shared-types/node_modules
    networks: [ctm-net]






