[pytest]
testpaths = unit integration
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: fast unit tests (no network, no DB)
    integration: integration tests (may require running services)
    slow: slow tests (excluded from default run)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
