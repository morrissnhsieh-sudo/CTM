# CTM Platform — Virtual host configuration
# Replace "ctm.example.com" with your actual domain throughout
# SSL certificates are managed by Certbot

# ── app.ctm.example.com — Frontend ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.ctm.example.com;

    ssl_certificate     /etc/letsencrypt/live/ctm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctm.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    limit_req zone=general burst=50 nodelay;

    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js HMR (dev only — remove in pure production)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Next.js static assets — aggressive caching
    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── api.ctm.example.com — REST API Gateway ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.ctm.example.com;

    ssl_certificate     /etc/letsencrypt/live/ctm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctm.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Standard API requests
    limit_req zone=api burst=200 nodelay;

    # Larger body for bulk row inserts / file uploads
    client_max_body_size 110m;

    location / {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI streaming endpoints take up to 120s
        proxy_send_timeout 120s;

        # SSE support (AI streaming responses)
        proxy_buffering    off;
        proxy_cache        off;
    }

    # MCP endpoint — longer timeout for agent runs
    location /mcp {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}

# ── collab.ctm.example.com — WebSocket CRDT (M2) ─────────────────────────────
server {
    listen 443 ssl http2;
    server_name collab.ctm.example.com;

    ssl_certificate     /etc/letsencrypt/live/ctm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctm.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://collab;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;    # Keep WebSocket alive for 24h
        proxy_send_timeout 86400s;
        proxy_buffering    off;
    }
}

# ── chat.ctm.example.com — Socket.io Messaging (M7) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name chat.ctm.example.com;

    ssl_certificate     /etc/letsencrypt/live/ctm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctm.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://messaging;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_buffering    off;
    }
}

# ── auth.ctm.example.com — Keycloak (M10) ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name auth.ctm.example.com;

    ssl_certificate     /etc/letsencrypt/live/ctm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctm.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    limit_req zone=auth burst=30 nodelay;

    # Needed for Keycloak's PKCE/redirect flows
    client_max_body_size 10m;

    location / {
        proxy_pass         http://keycloak_up;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  443;
        proxy_read_timeout 120s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }
}
