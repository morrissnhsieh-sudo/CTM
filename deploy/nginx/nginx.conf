# CTM Platform — Nginx reverse proxy configuration
# Handles SSL termination, routing, WebSocket upgrades

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript text/xml;
    gzip_min_length    1000;

    # Security headers (applied to all vhosts)
    add_header X-Frame-Options           "DENY"                       always;
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Hide server version
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m    rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=20r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=300r/m;

    # Upstream definitions
    upstream frontend      { server frontend:3000; }
    upstream api           { server api-service:3001; keepalive 32; }
    upstream collab        { server collab-service:1234; }
    upstream messaging     { server messaging-service:3002; }
    upstream keycloak_up   { server keycloak:8080; }
    upstream ai            { server ai-service:8001; }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
